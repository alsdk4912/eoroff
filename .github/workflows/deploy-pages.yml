# 배포 전: Settings → Pages → Source = "GitHub Actions" (아니면 deploy 단계 404)
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # VITE_API_BASE_URL은 빌드 시 번들에 박힘. 환경(Environment) 시크릿만 쓰는 경우
    # 여기 environment 이름이 GitHub 설정의 환경 이름과 정확히 같아야 secrets.VITE_API_BASE_URL이 주입됩니다.
    # (환경 대신 쓰려면: 저장소 Settings → Secrets → Actions → Repository secrets에 넣어도 됨)
    environment: main - eoroff-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install

      # 신청 데이터는 Turso(DB)에 보관됩니다. Pages 배포만으로 DB를 비우지 않습니다.
      # 전체 초기화가 필요할 때만 Actions →「Reset Turso leave data」또는 관리자 설정을 사용하세요.

      - name: Build (VITE_BASE=/저장소이름/)
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_DEPLOY_TAG: ${{ github.sha }}

      - name: SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
