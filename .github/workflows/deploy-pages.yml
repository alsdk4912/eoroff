# Pages 배포 전 필수: 저장소 Settings → Pages → Source = "GitHub Actions" 선택
# (안 하면 deploy 단계에서 Failed to create deployment 404 발생)
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  # Actions 탭 → 이 워크플로 → Run workflow (수동 실행)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # 여기에 npm ci 넣지 마세요(lock 불일치 시 바로 실패). npm install 만 사용.
      - run: npm install
      - name: Build (base = /eoroff/ 자동)
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
