# Render: New → Blueprint → GitHub eoroff 만 연결 (기존 Elixir 서비스는 삭제 후 새로)
services:
  - type: web
    name: eoroff-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    # 대시보드 Build에 "added" 등이 붙으면 bash: added: command not found → 칸 비우고 Blueprint만 쓰기
    buildCommand: npm run render:install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      # 무료로 데이터 유지: Turso DB 생성 후 Dashboard → Environment 에서 설정 (시크릿으로 추가 권장)
      # - key: TURSO_DATABASE_URL
      #   sync: false
      # - key: TURSO_AUTH_TOKEN
      #   sync: false
      # Turso 없이 Disk 쓸 때만:
      # - key: SQLITE_PATH
      #   value: /data/eoroff.sqlite
    # Disk 쓸 때만 Blueprint에 추가 (플랜에서 Disk 지원 필요)
    # disk:
    #   name: eoroff-sqlite
    #   mountPath: /data
    #   sizeGB: 1
