# Render: New → Blueprint → GitHub eoroff 만 연결 (기존 Elixir 서비스는 삭제 후 새로)
services:
  - type: web
    name: eoroff-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    # 대시보드 Build에 "added" 등이 붙으면 bash: added: command not found → 칸 비우고 Blueprint만 쓰기
    buildCommand: npm run render:install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      # 휴가 신청 내역 유지: Dashboard에서 Persistent Disk 추가 후 아래 주석 해제하고 경로 맞추기
      # (무료 플랜은 Disk 미지원일 수 있음 → 유료 인스턴스 또는 정책 확인)
      # - key: SQLITE_PATH
      #   value: /data/eoroff.sqlite
    # Disk 쓸 때만 Blueprint에 추가 (플랜에서 Disk 지원 필요)
    # disk:
    #   name: eoroff-sqlite
    #   mountPath: /data
    #   sizeGB: 1
